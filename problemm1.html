<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>
  化学部展 待機問題
</title>
  <link rel="icon" href="favicon.ico?update=001" type="image/x-icon">
</head>
<body>
  <h1><font color=black>中学生以下向け問題</font></h1>
  <font color=black>
  <p></p>



    <h2><p>★☆☆☆☆</p>
<p>金の元素記号は①④</p>
<p>亜鉛の元素記号は②⑤</p>
<p>ホウ素の元素記号は③</p>
<p>①②①③④=？？？？？</p>
<p>（分からない人は元素周期表を確認してみよう）</p></h2>
    
    <!-- 解答入力欄 -->
    <input type="text" id="answer" placeholder="答えを入力">
    
    <!-- 判定ボタン -->
    <button onclick="checkAnswer()">判定</button>
    
    <!-- 結果表示エリア -->
    <p id="result"></p>

    
<script>
    function checkAnswer() {
        const correctAnswer = "AZABu";
        let userAnswer = document.getElementById("answer").value;
        
        // 【重要】表示先の要素を「resultTarget」として取得しておく
        let resultTarget = document.getElementById("result");

        if (userAnswer.trim() === correctAnswer) {
            // 正解の時は innerHTML でリンクを表示
            resultTarget.innerHTML = `<a class="first after" href="problemm2.html">正解！次の問題はこちらから！</a>`;
        } else {
            // 不正解の時は innerText で文字を表示
            resultTarget.innerText = "不正解... ヒント:大文字と小文字";
        }
    }
</script>



  </font>
  
  

  
</body>
<script src="script.js"></script>
</body>
</html>
