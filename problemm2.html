<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>
  化学部展 待機問題
</title>
  <link rel="icon" href="favicon.ico?update=001" type="image/x-icon">
</head>
<body>
  <h1><font color=black>中学生以下向け問題</font></h1>
  <font color=black>
  <p>元素や原子について理解し、問題を解こう</p>



    <h2><p>★★☆☆☆</p>
<p>Aの元素番号×（Bの元素番号+Cの元素番号）=?</p>
<p>Aの説明:軽く、熱に強く、頑丈。たが毒性を持つ。電子部品に使われる</p>
    <p>Bの説明:古代でも硬貨や宝飾品として使われており、近年では半導体にも使われる。</p>
    <p>Cの説明:同じ年に複数人が発見し、第1発見者を巡って論争が起こった。紫外線をよく吸収する。</p>
    </h2>
    
    <!-- 解答入力欄 -->
    <input type="text" id="answer" placeholder="答えを入力(半角英数字)">
    
    <!-- 判定ボタン -->
    <button onclick="checkAnswer()">判定</button>
    
    <!-- 結果表示エリア -->
    <p id="result"></p>

    
<script>
    function checkAnswer() {
        const correctAnswer = "411";
        let userAnswer = document.getElementById("answer").value;
        
        // 【重要】表示先の要素を「resultTarget」として取得しておく
        let resultTarget = document.getElementById("result");

        if (userAnswer.trim() === correctAnswer) {
            // 正解の時は innerHTML でリンクを表示
            resultTarget.innerHTML = `<a class="first after" href="problemm3.html">正解！展示大賞は410,411化学部展まで！<p>次の問題はこちらから！</p></a>`;
        } else {
            // 不正解の時は innerText で文字を表示
            resultTarget.innerText = "不正解...";
        }
    }
</script>



  </font>
  
  

  
</body>
<script src="script.js"></script>
</body>
</html>
