<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>
  化学部展 待機問題
</title>
</head>
<body>
  <h1><font color=black>高校生・大人用問題</font></h1>
  <font color=black>
  <p>水酸化ナトリウムと酢酸の中和について考えよう</p>



    <h2><p>★★☆☆☆</p>
<p>水酸化ナトリウム水溶液と酢酸を反応させ、中和した時、発生する塩を答えなさい。</p></h2>
    
    <!-- 解答入力欄 -->
    <input type="text" id="answer" placeholder="答えを入力">
    
    <!-- 判定ボタン -->
    <button onclick="checkAnswer()">判定</button>
    
    <!-- 結果表示エリア -->
    <p id="result"></p>

    
    <script>
        function checkAnswer() {
            // 正解の定義
            const correctAnswer = "酢酸ナトリウム";
            
            // 入力された値を取得
            let userAnswer = document.getElementById("answer").value;
            let resultMessage = "";

            // 正誤判定
            if (userAnswer.trim() === correctAnswer) {
                resultMessage = "正解！　<div class="wrapper">
  <a class="first after" href="problem3.html">次の問題はこちら</a>
</div>";
            } else {
                resultMessage = "不正解... (解説は部員まで)";
            }

            // 結果を表示
            document.getElementById("result").innerText = resultMessage;
        }
    </script>



  </font>
  
  

  
</body>
<script src="script.js"></script>
</body>
</html>
